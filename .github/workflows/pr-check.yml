name: PR Build Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - lilygo-tdisplay-s3
          - lilygo-tdisplay-s3-amoled
          - lilygo-tdisplay
          - lilygo-t-qt
          - lilygo-t-hmi
          - m5stickc-plus
          - m5stack-core
          - m5stack-core2
          - sunton-2432s028
          - waveshare-s3-round
          - lilygo-t-watch-2020
          - lilygo-t-watch-s3
          - lilygo-tdeck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio esptool

      - name: Create config.h for build
        run: cp include/config.example.h include/config.h

      - name: Build ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }}

      - name: Report flash usage
        run: |
          echo "### Build: ${{ matrix.env }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import os
          build_dir = '.pio/build/${{ matrix.env }}'
          fw = os.path.join(build_dir, 'firmware.bin')
          if os.path.exists(fw):
              size = os.path.getsize(fw)
              print(f'Firmware size: {size:,} bytes ({size/1048576:.1f} MB)')
          "
