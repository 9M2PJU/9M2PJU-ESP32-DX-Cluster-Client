name: Build Firmware

on:
  push:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'include/**'
      - 'platformio.ini'
      - '.github/workflows/build-firmware.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - lilygo-tdisplay-s3
          - lilygo-tdisplay-s3-amoled
          - lilygo-tdisplay
          - lilygo-t-qt
          - lilygo-t-hmi
          - m5stickc-plus
          - m5stack-core
          - m5stack-core2
          - sunton-2432s028
          - waveshare-s3-round
          - lilygo-t-watch-2020
          - lilygo-t-watch-s3
          - lilygo-tdeck
          - heltec-wifi-kit-32
          - heltec-wifi-kit-32-v2
          - heltec-wifi-kit-32-v3
          - heltec-wifi-lora-32
          - heltec-wifi-lora-32-v2
          - heltec-wifi-lora-32-v3
          - heltec-wireless-stick
          - heltec-wireless-stick-lite
          - heltec-wireless-tracker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio esptool

      - name: Create config.h
        run: cp include/config.example.h include/config.h

      - name: Build ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }}

      - name: Package firmware
        run: |
          mkdir -p output
          ENV="${{ matrix.env }}"
          cp .pio/build/$ENV/firmware.bin "output/${ENV}-firmware.bin"
          if [ -f .pio/build/$ENV/bootloader.bin ]; then
            cp .pio/build/$ENV/bootloader.bin "output/${ENV}-bootloader.bin"
          fi
          if [ -f .pio/build/$ENV/partitions.bin ]; then
            cp .pio/build/$ENV/partitions.bin "output/${ENV}-partitions.bin"
          fi
          # Create a combined flashable image
          python3 -c "
          import os
          env = '${{ matrix.env }}'
          fw = f'output/{env}-firmware.bin'
          size = os.path.getsize(fw) if os.path.exists(fw) else 0
          print(f'{env}: firmware={size:,} bytes ({size//1024} KB)')
          "

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}
          path: output/*.bin
          retention-days: 30
          compression-level: 0

  summary:
    name: Build Summary
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Firmware Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Board | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| lilygo-tdisplay-s3 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| lilygo-tdisplay-s3-amoled | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| lilygo-tdisplay | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| lilygo-t-qt | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| lilygo-t-hmi | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| m5stickc-plus | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| m5stack-core | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| m5stack-core2 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| sunton-2432s028 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| waveshare-s3-round | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| lilygo-t-watch-2020 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| lilygo-t-watch-s3 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| lilygo-tdeck | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| heltec-wifi-kit-32 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| heltec-wifi-kit-32-v2 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| heltec-wifi-kit-32-v3 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| heltec-wifi-lora-32 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| heltec-wifi-lora-32-v2 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| heltec-wifi-lora-32-v3 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| heltec-wireless-stick | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| heltec-wireless-stick-lite | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| heltec-wireless-tracker | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Firmware binaries are available as artifacts on the Actions run page." >> $GITHUB_STEP_SUMMARY
          echo "Click the green checkmark above, then scroll down to Artifacts." >> $GITHUB_STEP_SUMMARY
