; ============================================================================
; 9M2PJU ESP32 DX Cluster Client
; Multi-board PlatformIO project. Build/upload the environment that matches
; your hardware, e.g.:
;
;   pio run -e lilygo-tdisplay-s3 -t upload
;
; All environments share the same src/ core and include/config.h. The board
; is selected by a -D BOARD_* flag which pulls in the matching LovyanGFX
; panel config from src/boards/.
; ============================================================================

[platformio]
default_envs = lilygo-tdisplay-s3

; ---- Shared settings applied to every environment -------------------------
[common]
lib_deps =
  lovyan03/LovyanGFX@^1.2.0
build_flags =
  -Wall -Wextra
monitor_speed = 115200
upload_speed = 921600

; ---- Per-board environments ------------------------------------------------

; --- LilyGO T-Display-S3 (1.9" ST7789 320x170, 8-bit parallel) -------------
[env:lilygo-tdisplay-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
lib_deps = ${common.lib_deps}
build_flags =
  ${common.build_flags}
  -D BOARD_LILYGO_TDISPLAY_S3
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DBOARD_HAS_PSRAM
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}

