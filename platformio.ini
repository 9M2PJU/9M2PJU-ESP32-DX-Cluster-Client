; --- LilyGO T-Deck (2.8" ST7789 320x240, ESP32-S3, keyboard+trackball) -----
; The T-Deck has a peripheral power-enable pin (GPIO 10) that must be set
; HIGH before the display will receive power. The firmware handles this
; automatically via initTDeckPower() at boot.
[env:lilygo-tdeck]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
lib_deps = ${common.lib_deps}
build_flags =
  ${common.build_flags}
  -D BOARD_LILYGO_TDECK
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DBOARD_HAS_PSRAM
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
