; (display power) via I2C at boot — no external PMU library needed.
; V3 users: add -D TWATCH_BL_PIN=15 to build_flags.
[env:lilygo-t-watch-2020]
platform = espressif32
board = esp32dev
framework = arduino
board_upload.flash_size = 16MB
lib_deps = ${common.lib_deps}
build_flags =
  ${common.build_flags}
  -D BOARD_LILYGO_TWATCH_2020
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}

